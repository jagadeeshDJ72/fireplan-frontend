<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pgTitle">Page — MiddleClassMoney.in</title>
<meta name="description" id="pgDesc" content="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.page-wrap{max-width:820px;margin:40px auto;padding:0 5%}
.page-body{background:#fff;border:1px solid #D6E8DC;border-radius:12px;padding:40px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.page-body h1{font-family:'Sora',sans-serif;font-size:28px;font-weight:700;margin-bottom:20px;color:#0F1F17}
.page-content{line-height:1.85;font-size:15px;color:#3A4A40}
.page-content h2{font-family:'Sora',sans-serif;font-size:21px;font-weight:700;margin:28px 0 12px;color:#0F1F17}
.page-content h3{font-size:17px;font-weight:600;margin:20px 0 8px}
.page-content p{margin-bottom:14px}
.page-content ul,.page-content ol{padding-left:22px;margin-bottom:14px}
.page-content li{margin-bottom:5px}
.page-content table{width:100%;border-collapse:collapse;margin:16px 0}
.page-content th{background:#1B6B45;color:#fff;padding:9px 12px;text-align:left}
.page-content td{border:1px solid #D6E8DC;padding:8px 12px}
.page-content a{color:#1B6B45}
.not-found{text-align:center;padding:80px 20px;color:#6B7D72}
</style>
</head>
<body>
<div id="navBar"></div>
<div class="breadcrumb"><a href="../index.html">Home</a> › <span id="pgBc">Loading...</span></div>

<div class="page-wrap">
  <div id="loading" style="text-align:center;padding:60px;color:#999">Loading page...</div>
  <div id="notFound" class="not-found" style="display:none">
    <h2>Page not found</h2><p>This page doesn't exist or has been removed.</p>
    <a href="../index.html" style="color:#1B6B45;font-weight:600">← Home</a>
  </div>
  <div class="page-body" id="pageBody" style="display:none">
    <h1 id="pgHeading"></h1>
    <div class="page-content" id="pgContent"></div>
  </div>
</div>

<div id="footerEl"></div>
<script src="../js/shared.js"></script>
<script>
const API = 'https://fireplan-api.onrender.com/api';
document.getElementById('navBar').outerHTML   = renderNav();
document.getElementById('footerEl').outerHTML = renderFooter();
const slug = new URLSearchParams(window.location.search).get('slug');
if(!slug){ showNotFound(); }
else {
  fetch(`${API}/pages/${slug}`)
    .then(r=>{ if(!r.ok) throw 0; return r.json(); })
    .then(d=>{
      const p = d.page;
      document.getElementById('pgTitle').textContent    = p.title+' — MiddleClassMoney.in';
      document.getElementById('pgDesc').content          = p.metaDesc||'';
      document.getElementById('pgBc').textContent        = p.title;
      document.getElementById('pgHeading').textContent   = p.title;
      document.getElementById('pgContent').innerHTML     = p.content;
      document.getElementById('loading').style.display   = 'none';
      document.getElementById('pageBody').style.display  = 'block';
    })
    .catch(showNotFound);
}
function showNotFound(){
  document.getElementById('loading').style.display='none';
  document.getElementById('notFound').style.display='block';
}
</script>
</body>
</html>
